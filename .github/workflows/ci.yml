name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Checar sintaxe (compileall)
        run: python -m compileall -q app seed.py alembic

      - name: Checar importacao da app FastAPI
        run: python -c "from app.main import app; print('OK:', app.title)"
        env:
          SECRET_KEY: ci-secret-key-not-for-production-1234567890
          JWT_SECRET_KEY: ci-jwt-secret-key-not-for-production-1234567890
          DATABASE_URL: postgresql+asyncpg://radar:radar@localhost:5432/radar
          REDIS_URL: redis://localhost:6379/0

      - name: Build da imagem Docker do backend
        run: docker build -t radar-backend:ci .

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producao (Next.js)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Build da imagem Docker do frontend
        run: docker build -t radar-frontend:ci .

  compose-config:
    name: Validar docker-compose.yml
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Criar .env de exemplo para validacao
        run: cp .env.example .env

      - name: Validar configuracao do Compose
        run: docker compose config -q
